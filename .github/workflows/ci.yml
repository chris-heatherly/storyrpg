name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck + Lint + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storyrpg-prototype
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: storyrpg-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (app)
        run: npm run typecheck:app

      - name: Typecheck (test)
        run: npm run typecheck:test

      - name: Typecheck (contracts)
        run: npm run typecheck:contracts

      - name: Typecheck (worker)
        run: npm run typecheck:worker

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: storyrpg-prototype/coverage
          if-no-files-found: ignore
          retention-days: 14
