name: E2E (nightly)

# Playwright story-playthrough — the highest-signal product test, previously
# never run automatically (docs/PROJECT_AUDIT_2026-05-28.md, Track A5).
# Scheduled + manual only: it boots the proxy + reader and is heavier/less
# deterministic than unit tests, so it must not gate PRs on introduction.
on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC nightly
  workflow_dispatch:

defaults:
  run:
    working-directory: storyrpg-prototype

jobs:
  e2e:
    name: story-playthrough (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: storyrpg-prototype/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start proxy + reader
        run: |
          CI=true npm run proxy &
          CI=true npm run reader:web &
          # Wait up to 3 minutes for the reader dev server on 8081.
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8081 >/dev/null; then
              echo "Reader is up."; exit 0
            fi
            sleep 2
          done
          echo "Reader did not come up on :8081 within timeout" >&2
          exit 1
      - name: Run E2E
        run: npm run test:e2e
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: storyrpg-prototype/test/e2e/report
          if-no-files-found: ignore
