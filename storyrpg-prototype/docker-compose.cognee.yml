services:
  cognee:
    # Pinned to the image digest verified by memory:doctor on 2026-07-11.
    # Update deliberately after running the Cognee provider-contract suite.
    image: cognee/cognee@sha256:d7d9573fda89c85e54e8f325c2fc9071e1d2781b0cb4ba668515168dada41de6
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # BOOT FALLBACK ONLY. At run time the pipeline pushes the narrative
      # model (or the generator's explicit Memory Graph LLM setting) to
      # Cognee's /api/v1/settings before the first memory operation, so the
      # extraction LLM follows the narrative model automatically. These env
      # values only cover operations that happen before any pipeline sync
      # (e.g. scripts/memory.mjs seeding on a fresh volume).
      - LLM_PROVIDER=anthropic
      - LLM_MODEL=${EXPO_PUBLIC_LLM_MODEL:-claude-sonnet-4-6}
      - LLM_API_KEY=${ANTHROPIC_API_KEY:-}
      # Anthropic has no embeddings endpoint and this image doesn't bundle
      # fastembed, so embeddings run on Gemini (hosted). Only the LLM tracks the
      # narrative model; embeddings are just a vector source.
      - EMBEDDING_PROVIDER=gemini
      - EMBEDDING_MODEL=gemini/gemini-embedding-001
      - EMBEDDING_DIMENSIONS=3072
      - EMBEDDING_API_KEY=${GEMINI_API_KEY:-}
      # Persist cognee's databases in the mounted volume. Without these the
      # image writes to /app/cognee/.cognee_system + .data_storage inside the
      # container layer and every recreate wipes datasets + minted API keys.
      - SYSTEM_ROOT_DIRECTORY=/app/.cognee/system
      - DATA_ROOT_DIRECTORY=/app/.cognee/data
    volumes:
      - cognee-data:/app/.cognee

volumes:
  cognee-data:
