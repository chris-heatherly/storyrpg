services:
  storyrpg-proxy:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && node --max-old-space-size=2048 --expose-gc proxy-server.js"
    ports:
      - "3001:3001"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3001
      - STORYRPG_WORKER_MAX_OLD_SPACE_SIZE_MB=4096
      # .env's COGNEE_BASE_URL points at localhost:8000 for HOST processes;
      # inside this container localhost is the proxy itself, so memory recall
      # died with "fetch failed" on every run (2026-07-03). The compose network
      # alias is the right target here (environment overrides env_file).
      - COGNEE_BASE_URL=http://cognee:8000
    volumes:
      - .:/app
      # Read-only view of the repo's .git so the proxy/workers can stamp the
      # commit they run (node slim image has no git binary; the app mount
      # carries no .git — every ledger row said workerGitSha: unknown).
      - ../.git:/repo-git:ro
