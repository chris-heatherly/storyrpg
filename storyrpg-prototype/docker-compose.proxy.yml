services:
  storyrpg-proxy:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && node --max-old-space-size=2048 --expose-gc proxy-server.js"
    ports:
      - "3001:3001"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3001
    volumes:
      - .:/app
